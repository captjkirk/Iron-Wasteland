<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Iron Wasteland</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { width: 100%; height: 100%; overflow: hidden; }

    body {
      /* position:fixed + inset:0 truly fills the iOS PWA screen regardless
         of safe-area offsets, viewport-height bugs, or the Home Bar */
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #0a0a0a;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Phaser mounts its canvas here.  CSS flex centers it; Phaser scales it.
       Using inset:0 (rather than width/height 100%) guarantees the element
       occupies the exact viewport rectangle that position:fixed defines. */
    #game-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
    }

    canvas {
      display: block;
      /* Let Phaser control the canvas pixel size; only constrain within
         the viewport so a miscalculation never causes overflow. */
      max-width: 100%;
      max-height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script src="lib/phaser.min.js"></script>
  <script src="game.js?v=20260415_1430"></script>
</body>
</html>
