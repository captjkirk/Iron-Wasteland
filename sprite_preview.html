    const LAUREN_FRAMES = [
      { key:'charmer',           label:'Side',       fn: drawLauren },

      { key:'ranger_step',       label:'Side Step',  fn: drawAbigailStep },

      { key:'ranger_bside',      label:'B-Diag',     fn: drawAbigailBSide },
    ];

    class PreviewScene extends Phaser.Scene {
      constructor() { super('Preview'); }
      preload() {}
      create() {
        const g = this.add.graphics();

        const renderFrame = (frameObj, containerId) => {
          frameObj.fn(g);
          const tex = this.textures.get(frameObj.key);
          const src = tex.getSourceImage();
          const div = document.createElement('div');
          div.className = 'frame';
          const c = document.createElement('canvas');
          c.width = 88; c.height = 120;
          const ctx = c.getContext('2d');
          ctx.imageSmoothingEnabled = false;
          ctx.drawImage(src, 0, 0, 44, 60, 0, 0, 88, 120);
          const label = document.createElement('span');
          label.textContent = frameObj.label;
          div.appendChild(c);
          div.appendChild(label);
          document.getElementById(containerId).appendChild(div);
        };

        LAUREN_FRAMES.slice(0,2).forEach(f => renderFrame(f, 'lauren-side'));
        LAUREN_FRAMES.slice(2,6).forEach(f => renderFrame(f, 'lauren-fb'));
        LAUREN_FRAMES.slice(6).forEach(f => renderFrame(f, 'lauren-diag'));

        ABIGAIL_FRAMES.slice(0,2).forEach(f => renderFrame(f, 'abigail-side'));
        ABIGAIL_FRAMES.slice(2,4).forEach(f => renderFrame(f, 'abigail-fb'));
        ABIGAIL_FRAMES.slice(4).forEach(f => renderFrame(f, 'abigail-diag'));

        g.destroy();
      }
    }

    new Phaser.Game({
      type: Phaser.CANVAS,
      canvas: document.getElementById('gameCanvas'),
      width: 44, height: 60,
      backgroundColor: '#000',
      scene: [ PreviewScene ],
    });
  </script>
